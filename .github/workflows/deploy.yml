name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 如果您的分支是 master，請把這裡改成 master

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 編譯後的輸出資料夾
          branch: gh-pages # 部署到的目標分支
